<!DOCTYPE html>
<html>
<head>
    <title>Kanały</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
        }
        .page {
            min-height: 100vh;
            padding-bottom: 90px;
        }
        .user-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            background: #212529;
            border-top: 1px solid #495057;
        }
    </style>
</head>

<body class="bg-dark text-white">

<div class="container mt-5 page">
    <h2>Wybierz kanał</h2>
    <hr>

    {% for ch in channels %}
        <div class="p-3 bg-secondary mb-2 rounded">
            <a href="/channel/{{ ch.id }}/" class="text-white">
                # {{ ch.name }}
            </a>
        </div>
    {% endfor %}

</div>

<div class="user-bar py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            Zalogowano jako:
            <strong>{{ user.username }}</strong>
        </div>
        <a href="/logout/" class="btn btn-danger">Wyloguj</a>
    </div>
</div>

</body>
</html>
